baseURL = "https://AbdullahRFA.github.io/"
languageCode = "en-us"
title = "Abdullah Nazmus-Sakib"
theme = "PaperMod"

menu:
  main:
    - identifier: home
      name: Home
      url: /home
      weight: 10
    - identifier: blog
      name: Blog
      url: /blog
      weight: 20
    - identifier: projects
      name: Projects
      url: /projects
      weight: 30
    - identifier: experience
      name: Experience
      url: /experience
      weight: 40
    - identifier: search
      name: Search
      url: /search
      weight: 50
    - identifier: tags
      name: Tags
      url: /tags
      weight: 60
    - identifier: education
      name: Education
      url: /education
      weight: 70

params:
  showToc: true
  TocOpen: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  hideMeta: false
  env: production
  hideDescriptionInList: false

  cover:
    hiddenInList: false
    hiddenInSingle: false

  socialIcons:
    - name: "email"
      url: "mailto:abdur.rahman.kalim@gmail.com"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/abdurrahmankalim"
    - name: "github"
      url: "https://github.com/arkalim"
    - name: "youtube"
      url: "https://www.youtube.com/c/AbdurRahmanKalim"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  social:
    - name: "Twitter"
      url: "https://twitter.com/yourusername"
    - name: "LinkedIn"
      url: "https://linkedin.com/in/yourusername"
    - name: "GitHub"
      url: "https://github.com/yourusername"

relativeURLs: true